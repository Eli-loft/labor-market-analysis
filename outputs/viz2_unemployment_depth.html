<script>

(function() {

    var targetValue = 6.6;
    var counterEl = null;
    var animated = false;

    function animateCounter() {
        if (animated) return;
        animated = true;
        var start = null;
        var duration = 10000;
        counterEl = document.createElement('div');
        counterEl.style.cssText = [
            'position:fixed',
            'bottom:150px',
            'right:50px',
            'background:rgba(22,33,62,0.96)',
            'border:2px solid #c0392b',
            'border-radius:8px',
            'padding:12px 18px',
            'color:#e0e0e0',
            'font-family:sans-serif',
            'font-size:14px',
            'z-index:1',
            'pointer-events:none',
            'box-shadow:0 0 20px rgba(192,57,43,0.4)',
            'transition:opacity 0.3s ease'
        ].join(';');
        var plotDiv = document.querySelector('.plotly-graph-div');
        plotDiv.style.position = 'relative';
        plotDiv.appendChild(counterEl);

        // Fade listeners
        plotDiv.on('plotly_hover', function(data) {
            if (!counterEl) return;
            var points = data.points;
            if (!points || points.length === 0) return;
            
            var hoverDate = new Date(points[0].x);
            var fadeDate = new Date('2017-05-01');
            var isPanel2 = points.some(function(p) { return p.curveNumber >= 2; });
            
            if (hoverDate >= fadeDate && isPanel2) {
                counterEl.style.opacity = '0.08';
            } else {
                counterEl.style.opacity = '1';
            }
        });

        plotDiv.on('plotly_unhover', function() {
            if (counterEl) counterEl.style.opacity = '1';
        });
        function step(timestamp) {
            if (!start) start = timestamp;
            var progress = Math.min((timestamp - start) / duration, 1);
            var eased = 1 - Math.pow(1 - progress, 3);
            var current = (eased * targetValue).toFixed(1);
            counterEl.innerHTML =
                '<div style="color:#888899;font-size:11px;letter-spacing:1px;margin-bottom:4px">WORKERS HIDDEN FROM HEADLINE</div>' +
                '<div style="color:#c0392b;font-size:28px;font-weight:bold;font-variant-numeric:tabular-nums">' + current + 'M</div>' +
                '<div style="color:#888899;font-size:10px;margin-top:4px">invisible to U-3 as of April 2026</div>';
            if (progress < 1) {
                requestAnimationFrame(step);
            }
        }
        requestAnimationFrame(step);
    }
    var activeIndex = 0;

    function applyButtonStyles(hoveredIndex) {
        var buttons = document.querySelectorAll('.updatemenu-item-rect');
        var texts = document.querySelectorAll('.updatemenu-item text');
        buttons.forEach(function(btn, i) {
            if (i === hoveredIndex) {
                btn.setAttribute('fill', '#c0392b');
            } else if (i === activeIndex) {
                btn.setAttribute('fill', '#2a1a2e');
            } else {
                btn.setAttribute('fill', '#1a1a2e');
            }
        });
        texts.forEach(function(t, i) {
            if (i === hoveredIndex) {
                t.setAttribute('fill', '#1a1a2e');
            } else {
                t.setAttribute('fill', '#e0e0e0');
            }
        });
    }

    plotDiv.on('plotly_buttonclicked', function(data) {
        activeIndex = data.button._index;
        applyButtonStyles(-1);
    });

    plotDiv.on('plotly_afterplot', function() {
        var buttons = document.querySelectorAll('.updatemenu-item-rect');
        buttons.forEach(function(btn, i) {
            btn.addEventListener('mouseenter', function() {
                applyButtonStyles(i);
            });
            btn.addEventListener('mouseleave', function() {
                applyButtonStyles(-1);
            });
        });
    });

    document.addEventListener('click', function(e) {
        var el = e.target;
        var parent = el.closest ? el.closest('[data-unformatted]') : null;
        var text = el.textContent || el.getAttribute('data-unformatted') || '';
        if (!text && el.parentElement) text = el.parentElement.textContent || '';

        if (text.indexOf('Show Full Picture') !== -1 || text.indexOf('Full Picture') !== -1) {
            setTimeout(animateCounter, 400);
        }
        if (text.indexOf('Official View') !== -1) {
            if (counterEl) { counterEl.remove(); counterEl = null; }
            animated = false;
        }
    }, true);
})();

</script>
</body>
</html>

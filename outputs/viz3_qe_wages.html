    document.addEventListener('click', function(e) {
        var text = e.target.textContent || '';
        if (!text && e.target.parentElement) text = e.target.parentElement.textContent || '';
        if (text.indexOf('Human Impact') !== -1) {
            if (shown) return;
            shown = true;
            var callout = document.createElement('div');
            callout.style.cssText = [
                'position:fixed',
                'top:120px',
                'right:30px',
                'background:rgba(22,33,62,0.96)',
                'border:2px solid #27ae60',
                'border-radius:8px',
                'padding:12px 18px',
                'color:#e0e0e0',
                'font-family:sans-serif',
                'font-size:13px',
                'z-index:9999',
                'max-width:260px',
                'box-shadow:0 0 20px rgba(39,174,96,0.3)'
            ].join(';');
            callout.innerHTML =
                '<div style="color:#27ae60;font-weight:bold;margin-bottom:8px">↙ PURCHASING POWER</div>' +
                '<div style="color:#888899">The green line crosses below 100 — your 2010 dollar now buys less ' +
                'while M2 grew <span style="color:#c0392b;font-weight:bold">2.2x faster</span> than wages.</div>';
            document.body.appendChild(callout);
            setTimeout(function() {
                callout.style.transition = 'opacity 1.2s';
                callout.style.opacity = '0';
                setTimeout(function() { callout.remove(); }, 1200);
            }, 5000);
        }
        if (text.indexOf('Money Expansion') !== -1) {
            shown = false;
        }
    }, true);
})();

</script>
</body>
</html>
